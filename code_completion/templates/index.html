<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OI-Wiki RAG 代码补全</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .main-content {
            display: flex;
            padding: 30px;
            gap: 30px;
        }
        
        .editor-section {
            flex: 2;
        }
        
        .info-section {
            flex: 1;
        }
        
        .editor-container {
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .editor-header {
            background: #2d2d2d;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }
        
        .language-badge {
            background: #4CAF50;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .cursor-info {
            background: #333;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        textarea {
            width: 100%;
            height: 500px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
        }
        
        .control-panel {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .control-item {
            margin-bottom: 15px;
        }
        
        .control-item label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        
        .control-item input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .analysis-card {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .analysis-card h3 {
            color: #e65100;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: #e8f5e9;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #2e7d32;
        }
        
        .completion-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: box-shadow 0.2s;
        }
        
        .completion-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .completion-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .confidence {
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }
        
        .confidence-high { background: #27ae60; }
        .confidence-medium { background: #f39c12; }
        .confidence-low { background: #e74c3c; }
        
        .completion-code {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            margin: 10px 0;
        }
        
        .completion-meta {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 OI-Wiki RAG 代码补全</h1>
            <p>基于检索增强生成的智能代码补全系统</p>
        </div>
        
        <div class="main-content">
            <div class="editor-section">
                <div class="editor-container">
                    <div class="editor-header">
                        <span class="language-badge">C++</span>
                        <span class="cursor-info" id="cursorInfo">光标位置: 450</span>
                    </div>
                    <textarea id="codeEditor">
#include &lt;bits/stdc++.h&gt;
using namespace std;

// 实现线段树的区间修改
class SegmentTree {
private:
    vector&lt;int&gt; tree, lazy;
    int n;
    
public:
    SegmentTree(int size) {
        n = size;
        tree.resize(4 * n);
        lazy.resize(4 * n, 0);
    }
    
    void updateRange(int l, int r, int val) {
        // 需要实现区间修改
    }
    
    int queryRange(int l, int r) {
        // 需要实现区间查询
    }
};</textarea>
                </div>
                
                <div class="control-panel">
                    <div class="control-item">
                        <label>📌 光标位置 (字符索引)</label>
                        <input type="number" id="cursorPos" value="450" min="0">
                    </div>
                    <button class="btn" id="completeBtn" onclick="generateCompletions()">
                        🎯 生成补全建议
                    </button>
                </div>
            </div>
            
            <div class="info-section">
                <div id="statusCard" class="status-card">
                    <h3>📊 状态</h3>
                    <p>就绪，等待生成...</p>
                </div>
                
                <div id="analysisCard" class="analysis-card" style="display: none;">
                    <h3>🔍 代码分析</h3>
                    <div id="analysisContent"></div>
                </div>
                
                <div id="statsCard" style="display: none;">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-number" id="codeCount">0</div>
                            <div>📄 代码示例</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="docCount">0</div>
                            <div>📚 相关文档</div>
                        </div>
                    </div>
                </div>
                
                <div id="loading" class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在生成补全建议...</p>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <div id="completionsList"></div>
            </div>
        </div>
    </div>
    
    <script>
        const codeEditor = document.getElementById('codeEditor');
        const cursorPos = document.getElementById('cursorPos');
        const cursorInfo = document.getElementById('cursorInfo');
        
        // 更新光标位置显示
        codeEditor.addEventListener('click', function() {
            cursorPos.value = this.selectionStart;
            cursorInfo.textContent = `光标位置: ${this.selectionStart}`;
        });
        
        codeEditor.addEventListener('keyup', function() {
            cursorPos.value = this.selectionStart;
            cursorInfo.textContent = `光标位置: ${this.selectionStart}`;
        });
        
        cursorPos.addEventListener('input', function() {
            cursorInfo.textContent = `光标位置: ${this.value}`;
        });
        
        async function generateCompletions() {
            const code = codeEditor.value;
            const pos = cursorPos.value;
            
            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('completeBtn').disabled = true;
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('completionsList').innerHTML = '';
            document.getElementById('analysisCard').style.display = 'none';
            document.getElementById('statsCard').style.display = 'none';
            
            try {
                const response = await fetch('/api/complete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        code: code,
                        cursor_pos: parseInt(pos)
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                } else {
                    showError(data.error || '生成失败');
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('completeBtn').disabled = false;
            }
        }
        
        function displayResults(data) {
            // 更新状态
            document.getElementById('statusCard').innerHTML = `
                <h3>📊 状态</h3>
                <p>✅ 生成 ${data.completions.length} 个补全建议 (耗时 ${data.time_ms}ms)</p>
            `;
            
            // 显示分析结果
            if (data.analysis) {
                document.getElementById('analysisCard').style.display = 'block';
                document.getElementById('analysisContent').innerHTML = `
                    <p><strong>语言:</strong> ${data.analysis.language || 'N/A'}</p>
                    <p><strong>意图:</strong> ${data.analysis.intent || 'N/A'}</p>
                    <p><strong>缺失:</strong> ${data.analysis.missing_part || 'N/A'}</p>
                `;
            }
            
            // 显示统计
            document.getElementById('statsCard').style.display = 'block';
            document.getElementById('codeCount').textContent = data.knowledge.code_count;
            document.getElementById('docCount').textContent = data.knowledge.doc_count;
            
            // 显示补全建议
            const completionsList = document.getElementById('completionsList');
            completionsList.innerHTML = '<h3>✨ 补全建议</h3>';
            
            data.completions.forEach((comp, index) => {
                const confidence = comp.confidence || 0.5;
                let confidenceClass = 'confidence-medium';
                if (confidence >= 0.8) confidenceClass = 'confidence-high';
                if (confidence <= 0.3) confidenceClass = 'confidence-low';
                
                const item = document.createElement('div');
                item.className = 'completion-item';
                item.innerHTML = `
                    <div class="completion-header">
                        <span style="font-weight: bold;">建议 ${index + 1}</span>
                        <span class="confidence ${confidenceClass}">置信度 ${confidence.toFixed(2)}</span>
                    </div>
                    <div class="completion-code">${comp.completion.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                    <div class="completion-meta">
                        📝 ${comp.description || ''} | 来源: ${comp.source || '知识库'}
                    </div>
                `;
                completionsList.appendChild(item);
            });
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'block';
            errorDiv.textContent = '❌ ' + message;
        }
    </script>
</body>
</html>
